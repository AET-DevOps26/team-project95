info:
  name: Get Thesis By ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{thesisServiceUrl}}/api/v1/theses/{{thesisId}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200 or 404", function() {
          expect(res.status).to.be.oneOf([200, 404]);
        });
        test("Response has expected shape", function() {
          if (res.status === 200) {
            expect(res.body).to.have.property("id");
            expect(res.body).to.have.property("title");
          } else {
            expect(res.body).to.have.property("message");
          }
        });

settings:
  encodeUrl: true
