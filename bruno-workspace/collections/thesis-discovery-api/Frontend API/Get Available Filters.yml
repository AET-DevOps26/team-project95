info:
  name: Get Available Filters
  type: http
  seq: 5

http:
  method: GET
  url: "{{thesisServiceUrl}}/api/v1/filters"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Body contains filter arrays", function() {
          expect(res.body).to.have.property("chairs");
          expect(res.body).to.have.property("degreeTypes");
          expect(res.body).to.have.property("researchAreas");
          expect(res.body).to.have.property("tags");
        });

settings:
  encodeUrl: true
