info:
  name: Extract Theses
  type: http
  seq: 1

http:
  method: POST
  url: "{{genaiServiceUrl}}/internal/v1/genai-service/extract-theses"
  body:
    type: json
    data: |-
      {
        "sourceEndpointId": {{sourceEndpointId}},
        "chairId": {{chairId}},
        "chairName": "Chair of Software Engineering",
        "sourceUrl": "https://example-chair.tum.de/theses",
        "rawHtml": "<html><body><h1>Semantic Search for Thesis Discovery</h1><p>Open master thesis about semantic search with LLMs.</p></body></html>",
        "extractedPlainText": "Semantic Search for Thesis Discovery. Open master thesis about semantic search with LLMs."
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200 or 422", function() {
          expect(res.status).to.be.oneOf([200, 422]);
        });
        test("Response has expected shape", function() {
          if (res.status === 200) {
            expect(res.body).to.have.property("theses");
            expect(res.body.theses).to.be.an("array");
          } else {
            expect(res.body).to.have.property("message");
          }
        });

settings:
  encodeUrl: true
