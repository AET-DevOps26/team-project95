server:
  port: 8082

spring:
  application:
    name: vector-search-service

  datasource:
    url: ${PGVECTOR_URL:jdbc:postgresql://localhost:5433/vector_search_db}
    username: ${PGVECTOR_USERNAME:vector_user}
    password: ${PGVECTOR_PASSWORD:vector_password}

  ai:
    openai:
      base-url: ${AZURE_OPENAI_ENDPOINT:}
      api-key: ${AZURE_OPENAI_API_KEY:}
      embedding:
        deployment-name: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:text-embedding-ada-002}
        model: ${AZURE_OPENAI_EMBEDDING_MODEL:text-embedding-ada-002}

    vectorstore:
      pgvector:
        initialize-schema: ${PGVECTOR_INITIALIZE_SCHEMA:true}
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${PGVECTOR_DIMENSIONS:1536}
        max-document-batch-size: 10000

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info
