spring:
  datasource:
    url: jdbc:postgresql://${THESIS_DB_HOST:${DB_HOST:localhost}}:${THESIS_DB_PORT:${DB_PORT:5432}}/${THESIS_DB_NAME:${DB_NAME:thesis_db}}
    username: ${THESIS_DB_USER:${DB_USER:thesis_user}}
    password: ${THESIS_DB_PASSWORD:${DB_PASSWORD:thesis_password}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  flyway:
    enabled: true
    baseline-on-migrate: true
    check-location: true
    locations: classpath:db/migration

app:
  client:
    vector-search:
      url: ${THESIS_VECTOR_SEARCH_URL:${VECTOR_SEARCH_URL:http://localhost:8082}}
    timeouts:
      connect-ms: ${THESIS_CLIENT_CONNECT_TIMEOUT:${CLIENT_CONNECT_TIMEOUT:4000}}
      read-ms: ${THESIS_CLIENT_READ_TIMEOUT:${CLIENT_READ_TIMEOUT:10000}}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info
