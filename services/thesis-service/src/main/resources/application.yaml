spring:
  datasource:
    url: jdbc:postgresql://${THESIS_DB_HOST:${DB_HOST:localhost}}:${THESIS_DB_PORT:${DB_PORT:5432}}/${THESIS_DB_NAME:${DB_NAME:thesis_db}}
    username: ${THESIS_DB_USER:${DB_USER:thesis_user}}
    password: ${THESIS_DB_PASSWORD:${DB_PASSWORD:thesis_password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

app:
  services:
    vector-search: ${VECTOR_SEARCH_SERVICE_URL:${APP_SERVICES_VECTOR_SEARCH:http://localhost:8082}}
