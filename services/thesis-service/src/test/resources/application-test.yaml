spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: never

app:
  client:
    vector-search:
      url: http://localhost:8082
    timeouts:
      connect-ms: 250
      read-ms: 250
