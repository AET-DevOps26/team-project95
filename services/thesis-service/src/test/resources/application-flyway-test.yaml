spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

app:
  client:
    vector-search:
      url: http://localhost:8082
    timeouts:
      connect-ms: 250
      read-ms: 250
