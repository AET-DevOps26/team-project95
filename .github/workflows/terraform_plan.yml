name: Terraform Plan

on:
  workflow_call:
    secrets:
      AZURE_CREDENTIALS:
        required: true
      AZURE_TF_BACKEND_RESOURCE_GROUP:
        required: true
      AZURE_TF_BACKEND_STORAGE_ACCOUNT:
        required: true
      AZURE_TF_BACKEND_CONTAINER:
        required: true
      AZURE_TF_BACKEND_KEY:
        required: true
      AZURE_VM_SSH_PUBLIC_KEY:
        required: true

permissions:
  contents: read

jobs:
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_admin_ssh_public_key: ${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.AZURE_TF_BACKEND_KEY }}"

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -no-color
