name: Deploy Kubernetes

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: kubernetes-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync Kubernetes secrets
        env:
          THESIS_DB_PASSWORD: ${{ secrets.THESIS_DB_PASSWORD }}
          VECTOR_DB_PASSWORD: ${{ secrets.VECTOR_DB_PASSWORD }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          kubectl create namespace open-thesis-radar --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic thesis-db-secret \
            --namespace open-thesis-radar \
            --from-literal=password="$THESIS_DB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic vector-db-secret \
            --namespace open-thesis-radar \
            --from-literal=password="$VECTOR_DB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic azure-openai-secret \
            --namespace open-thesis-radar \
            --from-literal=endpoint="$AZURE_OPENAI_ENDPOINT" \
            --from-literal=api-key="$AZURE_OPENAI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm chart
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: ./infra/helm/deploy-helm.sh
