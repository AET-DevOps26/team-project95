name: Deploy Infrastructure and App

on:
  workflow_dispatch:
    inputs:
      app_domain:
        description: "Domain to deploy. Leave empty to use openthesisradar.<public-ip>.nip.io"
        required: false
        default: ""
      enable_certbot:
        description: "Request/configure Let's Encrypt certificates"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform apply and Ansible deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_admin_ssh_public_key: ${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}
      ADMIN_USERNAME: azureuser
      IMAGE_TAG: latest
      CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
      ENABLE_CERTBOT: ${{ inputs.enable_certbot }}
      THESIS_DB_PASSWORD: ${{ secrets.THESIS_DB_PASSWORD }}
      VECTOR_DB_PASSWORD: ${{ secrets.VECTOR_DB_PASSWORD }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.AZURE_TF_BACKEND_KEY }}"

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tfout
        working-directory: infra/terraform
        run: |
          public_ip="$(terraform output -raw public_ip_address)"
          echo "public_ip=$public_ip" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        run: |
          python -m pip install --user ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare SSH key and inventory
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          PUBLIC_IP: ${{ steps.tfout.outputs.public_ip }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key

          cat > infra/ansible/inventory.ini <<EOF
          [app]
          ${PUBLIC_IP} ansible_user=${ADMIN_USERNAME} ansible_ssh_private_key_file=~/.ssh/azure_vm_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF

      - name: Wait for SSH
        env:
          PUBLIC_IP: ${{ steps.tfout.outputs.public_ip }}
        run: |
          for attempt in {1..30}; do
            if ssh -i ~/.ssh/azure_vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 "${ADMIN_USERNAME}@${PUBLIC_IP}" true; then
              exit 0
            fi
            echo "SSH not ready yet (${attempt}/30); waiting..."
            sleep 10
          done
          exit 1

      - name: Prepare deployment environment
        id: deploy-env
        env:
          PUBLIC_IP: ${{ steps.tfout.outputs.public_ip }}
          INPUT_APP_DOMAIN: ${{ inputs.app_domain }}
        run: |
          set -euo pipefail
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ -n "$INPUT_APP_DOMAIN" ]; then
            app_domain="${INPUT_APP_DOMAIN,,}"
          else
            app_domain="openthesisradar.${PUBLIC_IP}.nip.io"
          fi
          echo "IMAGE_REPOSITORY=$image_repository" >> "$GITHUB_ENV"
          echo "APP_DOMAIN=$app_domain" >> "$GITHUB_ENV"

      - name: Run Ansible deployment playbook
        run: ansible-playbook -i infra/ansible/inventory.ini infra/ansible/deploy.yml
