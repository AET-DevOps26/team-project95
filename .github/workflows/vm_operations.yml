name: VM Operations

on:
  workflow_dispatch:
    inputs:
      help:
        description: "Codes: 0=off/stop, 1=on/start, 2=restart, 3=no change. If VM is 0/1/2, service selections are ignored; stopping VM stops services, starting/restarting VM brings services up with Ansible."
        required: false
        type: choice
        options:
          - "I understand"
        default: "I understand"
      vm:
        description: "VM operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      user_interface:
        description: "user-interface operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      thesis_service:
        description: "thesis-service operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      genai_service:
        description: "genai-service operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      vector_search_service:
        description: "vector-search-service operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      prometheus:
        description: "prometheus operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      grafana:
        description: "grafana operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"
      nginx_exporter:
        description: "nginx-exporter operation"
        required: true
        type: choice
        options:
          - "3"
          - "0"
          - "1"
          - "2"
        default: "3"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  operate:
    name: Run selected VM operations
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      ADMIN_USERNAME: azureuser

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate selected operations
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.vm }}" == "3" \
            && "${{ inputs.user_interface }}" == "3" \
            && "${{ inputs.thesis_service }}" == "3" \
            && "${{ inputs.genai_service }}" == "3" \
            && "${{ inputs.vector_search_service }}" == "3" \
            && "${{ inputs.prometheus }}" == "3" \
            && "${{ inputs.grafana }}" == "3" \
            && "${{ inputs.nginx_exporter }}" == "3" ]]; then
            echo "Select at least one operation. Use 0=off/stop, 1=on/start, 2=restart, 3=no change."
            exit 1
          fi

          if [[ "${{ inputs.vm }}" != "3" ]]; then
            echo "VM operation selected. Service operations will be ignored by design."
          fi

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.AZURE_TF_BACKEND_KEY }}"

      - name: Read Terraform outputs
        id: tfout
        working-directory: infra/terraform
        run: |
          set -euo pipefail
          echo "public_ip=$(terraform output -raw public_ip_address)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "vm_name=$(terraform output -raw vm_name)" >> "$GITHUB_OUTPUT"

      - name: Prepare operation plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          needs_ssh=false
          has_service_ops=false
          vm_action=none

          case "${{ inputs.vm }}" in
            0) vm_action=stop ;;
            1) vm_action=start; needs_ssh=true ;;
            2) vm_action=restart; needs_ssh=true ;;
            3) vm_action=none ;;
          esac

          if [[ "$vm_action" == "none" ]]; then
            [[ "${{ inputs.user_interface }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.thesis_service }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.genai_service }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.vector_search_service }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.prometheus }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.grafana }}" != "3" ]] && has_service_ops=true
            [[ "${{ inputs.nginx_exporter }}" != "3" ]] && has_service_ops=true
            [[ "$has_service_ops" == "true" ]] && needs_ssh=true
          fi

          echo "vm_action=$vm_action" >> "$GITHUB_OUTPUT"
          echo "needs_ssh=$needs_ssh" >> "$GITHUB_OUTPUT"
          echo "has_service_ops=$has_service_ops" >> "$GITHUB_OUTPUT"

      - name: Start Azure VM
        if: steps.plan.outputs.vm_action == 'start'
        run: |
          az vm start \
            --resource-group "${{ steps.tfout.outputs.resource_group_name }}" \
            --name "${{ steps.tfout.outputs.vm_name }}"

      - name: Restart Azure VM
        if: steps.plan.outputs.vm_action == 'restart'
        run: |
          az vm restart \
            --resource-group "${{ steps.tfout.outputs.resource_group_name }}" \
            --name "${{ steps.tfout.outputs.vm_name }}"

      - name: Prepare SSH key and inventory
        if: steps.plan.outputs.needs_ssh == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          PUBLIC_IP: ${{ steps.tfout.outputs.public_ip }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key

          cat > infra/ansible/inventory.ini <<EOF
          [app]
          ${PUBLIC_IP} ansible_user=${ADMIN_USERNAME} ansible_ssh_private_key_file=~/.ssh/azure_vm_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF

      - name: Wait for SSH
        if: steps.plan.outputs.needs_ssh == 'true'
        env:
          PUBLIC_IP: ${{ steps.tfout.outputs.public_ip }}
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if ssh -i ~/.ssh/azure_vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 "${ADMIN_USERNAME}@${PUBLIC_IP}" true; then
              exit 0
            fi
            echo "SSH not ready yet (${attempt}/30); waiting..."
            sleep 10
          done
          exit 1

      - name: Install Ansible
        if: steps.plan.outputs.needs_ssh == 'true'
        run: |
          python -m pip install --user ansible-core==2.21.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible --version

      - name: Bring services up after VM operation
        if: steps.plan.outputs.vm_action == 'start' || steps.plan.outputs.vm_action == 'restart'
        run: |
          ansible app \
            -i infra/ansible/inventory.ini \
            -b \
            -m ansible.builtin.shell \
            -a "cd /open-thesis-radar && docker compose up -d"

      - name: Operate user-interface
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.user_interface != '3'
        env:
          SERVICE: frontend
          SERVICE_OPERATION: ${{ inputs.user_interface }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate thesis-service
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.thesis_service != '3'
        env:
          SERVICE: thesis-service
          SERVICE_OPERATION: ${{ inputs.thesis_service }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate genai-service
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.genai_service != '3'
        env:
          SERVICE: genai-service
          SERVICE_OPERATION: ${{ inputs.genai_service }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate vector-search-service
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.vector_search_service != '3'
        env:
          SERVICE: vector-search-service
          SERVICE_OPERATION: ${{ inputs.vector_search_service }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate prometheus
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.prometheus != '3'
        env:
          SERVICE: prometheus
          SERVICE_OPERATION: ${{ inputs.prometheus }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate grafana
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.grafana != '3'
        env:
          SERVICE: grafana
          SERVICE_OPERATION: ${{ inputs.grafana }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Operate nginx-exporter
        if: steps.plan.outputs.has_service_ops == 'true' && inputs.nginx_exporter != '3'
        env:
          SERVICE: nginx-exporter
          SERVICE_OPERATION: ${{ inputs.nginx_exporter }}
        run: |
          case "$SERVICE_OPERATION" in
            0) ACTION=stop ;;
            1) ACTION=start ;;
            2) ACTION=restart ;;
          esac
          export ACTION
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/ops.yml

      - name: Stop Azure VM
        if: steps.plan.outputs.vm_action == 'stop'
        run: |
          az vm deallocate \
            --resource-group "${{ steps.tfout.outputs.resource_group_name }}" \
            --name "${{ steps.tfout.outputs.vm_name }}"
