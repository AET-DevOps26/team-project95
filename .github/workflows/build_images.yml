name: Build Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: ./user_interface/open-thesis-radar
            dockerfile: ./user_interface/open-thesis-radar/Dockerfile
          - image: thesis-service
            context: .
            dockerfile: ./services/thesis-service/Dockerfile
          - image: scraping-service
            context: .
            dockerfile: ./services/scraping-service/Dockerfile
          - image: vector-search-service
            context: .
            dockerfile: ./services/vector-search-service/Dockerfile
          - image: genai-service
            context: .
            dockerfile: ./services/genai-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare image repository name
        id: repo
        shell: bash
        run: echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
