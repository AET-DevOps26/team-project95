name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user_interface/open-thesis-radar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: user_interface/open-thesis-radar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated OpenAPI types
        run: npm run check:api

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend client side tests
        run: npm run test:client-side

  backend:
    name: Backend build, lint and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build and verify Maven services
        run: mvn -B verify

  genai:
    name: GenAI lint and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/genai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/genai-service/pyproject.toml

      - name: Install GenAI service with dev dependencies
        run: pip install -e ".[dev]"

      - name: Check Python formatting
        run: ruff format --check .

      - name: Lint Python code
        run: ruff check .

      - name: Run GenAI tests
        run: pytest

  openapi:
    name: OpenAPI lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint OpenAPI contract
        run: npx --yes @redocly/cli@2.37.0 lint api/openapi-v1.yml

  docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Validate Compose configuration
        run: docker compose config

  compose-smoke-tests:
    name: Docker Compose Bruno smoke tests
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - genai
      - docker-compose
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start Docker Compose stack
        run: docker compose up --build -d

      - name: Wait for required service health endpoints
        run: |
          bash scripts/wait-for-health.sh \
            http://localhost:8080/health \
            http://localhost:8081/health

      - name: Run Bruno smoke tests
        run: |
          ./scripts/run-bruno-tests.sh \
            "Health/Thesis Service Health.yml" \
            "Health/Scraping Service Health.yml" \
            "Frontend API/List Theses.yml" \
            "Frontend API/List Chairs.yml" \
            "Frontend API/Get Available Filters.yml" \
            --tests-only

      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v --remove-orphans

  terraform-plan:
    name: Terraform plan
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/terraform_plan.yml
    secrets: inherit

  docker-images:
    name: Build Docker images
    needs:
      - frontend
      - backend
      - genai
      - docker-compose
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build_images.yml
    with:
      push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    secrets: inherit
