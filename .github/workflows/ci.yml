name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user_interface/open-thesis-radar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: user_interface/open-thesis-radar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build and verify Maven services
        run: mvn -B verify

  genai:
    name: GenAI lint and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/genai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/genai-service/pyproject.toml

      - name: Install GenAI service with dev dependencies
        run: pip install -e ".[dev]"

      - name: Check Python formatting
        run: ruff format --check .

      - name: Lint Python code
        run: ruff check .

      - name: Run GenAI tests
        run: pytest

  docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Validate Compose configuration
        run: docker compose config
