name: open-thesis-radar

services:
  frontend:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}/frontend:${IMAGE_TAG:-latest}
    container_name: open-thesis-radar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - thesis-service
      - scraping-service
      - vector-search-service
      - genai-service

  thesis-service:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}/thesis-service:${IMAGE_TAG:-latest}
    container_name: open-thesis-radar-thesis-service
    restart: unless-stopped
    environment:
      THESIS_DB_HOST: thesis-db
      THESIS_DB_PORT: 5432
      THESIS_DB_NAME: ${THESIS_DB_NAME:-thesis_db}
      THESIS_DB_USER: ${THESIS_DB_USER:-thesis_user}
      THESIS_DB_PASSWORD: ${THESIS_DB_PASSWORD:?THESIS_DB_PASSWORD is required}
      THESIS_VECTOR_SEARCH_URL: http://vector-search-service:8082
    depends_on:
      thesis-db:
        condition: service_healthy
      vector-search-service:
        condition: service_started

  scraping-service:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}/scraping-service:${IMAGE_TAG:-latest}
    container_name: open-thesis-radar-scraping-service
    restart: unless-stopped
    environment:
      APP_SERVICES_MAIN_THESIS: http://thesis-service:8080
      APP_SERVICES_GENAI: http://genai-service:8000
      CLIENT_CONNECT_TIMEOUT: ${CLIENT_CONNECT_TIMEOUT:-4000}
      CLIENT_READ_TIMEOUT: ${CLIENT_READ_TIMEOUT:-300000}
    depends_on:
      - thesis-service
      - genai-service

  vector-search-service:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}/vector-search-service:${IMAGE_TAG:-latest}
    container_name: open-thesis-radar-vector-search-service
    restart: unless-stopped
    environment:
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:?AZURE_OPENAI_ENDPOINT is required}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?AZURE_OPENAI_API_KEY is required}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-ada-002}
      AZURE_OPENAI_EMBEDDING_MODEL: ${AZURE_OPENAI_EMBEDDING_MODEL:-text-embedding-ada-002}
      PGVECTOR_DIMENSIONS: ${PGVECTOR_DIMENSIONS:-1536}
      PGVECTOR_URL: jdbc:postgresql://vector-db:5432/${VECTOR_DB_NAME:-vector_search_db}
      PGVECTOR_USERNAME: ${VECTOR_DB_USER:-vector_user}
      PGVECTOR_PASSWORD: ${VECTOR_DB_PASSWORD:?VECTOR_DB_PASSWORD is required}
    depends_on:
      vector-db:
        condition: service_healthy

  genai-service:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}/genai-service:${IMAGE_TAG:-latest}
    container_name: open-thesis-radar-genai-service
    restart: unless-stopped
    environment:
      GENAI_USE_OLLAMA: ${GENAI_USE_OLLAMA:-false}
      GENAI_MAX_COMPLETION_TOKENS: ${GENAI_MAX_COMPLETION_TOKENS:-30000}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:?AZURE_OPENAI_ENDPOINT is required}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?AZURE_OPENAI_API_KEY is required}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.4}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      GENAI_MODEL_NAME: ${GENAI_MODEL_NAME:-llama3.1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

  thesis-db:
    image: postgres:16-alpine
    container_name: open-thesis-radar-thesis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${THESIS_DB_NAME:-thesis_db}
      POSTGRES_USER: ${THESIS_DB_USER:-thesis_user}
      POSTGRES_PASSWORD: ${THESIS_DB_PASSWORD:?THESIS_DB_PASSWORD is required}
    volumes:
      - thesis-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  vector-db:
    image: pgvector/pgvector:pg16
    container_name: open-thesis-radar-vector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VECTOR_DB_NAME:-vector_search_db}
      POSTGRES_USER: ${VECTOR_DB_USER:-vector_user}
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:?VECTOR_DB_PASSWORD is required}
    volumes:
      - vector-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  certbot:
    image: certbot/certbot:latest
    container_name: open-thesis-radar-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: open-thesis-radar-nginx-exporter
    network_mode: "service:frontend"
    command:
      - --nginx.scrape-uri=http://127.0.0.1:80/nginx_status
    depends_on:
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: open-thesis-radar-prometheus
    volumes:
      - ./infra/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      thesis-service:
        condition: service_started
      scraping-service:
        condition: service_started
      vector-search-service:
        condition: service_started
      genai-service:
        condition: service_started
      nginx-exporter:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    container_name: open-thesis-radar-grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - THESIS_DB_USER=${THESIS_DB_USER:-thesis_user}
      - THESIS_DB_NAME=${THESIS_DB_NAME:-thesis_db}
      - THESIS_DB_PASSWORD=${THESIS_DB_PASSWORD:?THESIS_DB_PASSWORD is required}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  thesis-postgres-data:
  vector-postgres-data:
  letsencrypt:
  certbot-webroot:
  prometheus-data:
