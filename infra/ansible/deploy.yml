---
- name: Deploy Open Thesis Radar
  hosts: app
  become: true
  vars:
    app_dir: /open-thesis-radar
    app_domain: "{{ lookup('env', 'APP_DOMAIN') | lower }}"
    app_additional_domains: "{{ lookup('env', 'APP_ADDITIONAL_DOMAINS') | default('', true) | lower | split(',') | map('trim') | reject('equalto', '') | list }}"
    app_domains: "{{ ([app_domain] + app_additional_domains) | unique | list }}"
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') }}"
    image_repository: "{{ lookup('env', 'IMAGE_REPOSITORY') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    ghcr_user: "{{ lookup('env', 'GHCR_USER') }}"
    ghcr_token: "{{ lookup('env', 'GHCR_TOKEN') }}"
    enable_certbot: "{{ lookup('env', 'ENABLE_CERTBOT') | default('true', true) | bool }}"
    thesis_db_name: "{{ lookup('env', 'THESIS_DB_NAME') | default('thesis_db', true) }}"
    thesis_db_user: "{{ lookup('env', 'THESIS_DB_USER') | default('thesis_user', true) }}"
    thesis_db_password: "{{ lookup('env', 'THESIS_DB_PASSWORD') }}"
    vector_db_name: "{{ lookup('env', 'VECTOR_DB_NAME') | default('vector_search_db', true) }}"
    vector_db_user: "{{ lookup('env', 'VECTOR_DB_USER') | default('vector_user', true) }}"
    vector_db_password: "{{ lookup('env', 'VECTOR_DB_PASSWORD') }}"
    client_connect_timeout: "{{ lookup('env', 'CLIENT_CONNECT_TIMEOUT') | default('4000', true) }}"
    client_read_timeout: "{{ lookup('env', 'CLIENT_READ_TIMEOUT') | default('300000', true) }}"
    azure_openai_endpoint: "{{ lookup('env', 'AZURE_OPENAI_ENDPOINT') }}"
    azure_openai_api_key: "{{ lookup('env', 'AZURE_OPENAI_API_KEY') }}"
    azure_openai_embedding_deployment: "{{ lookup('env', 'AZURE_OPENAI_EMBEDDING_DEPLOYMENT') | default('text-embedding-ada-002', true) }}"
    azure_openai_embedding_model: "{{ lookup('env', 'AZURE_OPENAI_EMBEDDING_MODEL') | default('text-embedding-ada-002', true) }}"
    pgvector_dimensions: "{{ lookup('env', 'PGVECTOR_DIMENSIONS') | default('1536', true) }}"
    genai_use_ollama: "{{ lookup('env', 'GENAI_USE_OLLAMA') | default('false', true) | lower }}"
    genai_max_completion_tokens: "{{ lookup('env', 'GENAI_MAX_COMPLETION_TOKENS') | default('30000', true) }}"
    azure_openai_chat_deployment: "{{ lookup('env', 'AZURE_OPENAI_CHAT_DEPLOYMENT') | default('gpt-5.4', true) }}"
    azure_openai_api_version: "{{ lookup('env', 'AZURE_OPENAI_API_VERSION') | default('2024-12-01-preview', true) }}"
    genai_model_name: "{{ lookup('env', 'GENAI_MODEL_NAME') | default('llama3.1', true) }}"
    ollama_base_url: "{{ lookup('env', 'OLLAMA_BASE_URL') | default('http://host.docker.internal:11434', true) }}"
    grafana_admin_user: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('admin', true) }}"
    grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
  pre_tasks:
    - name: Validate required deployment environment variables
      ansible.builtin.assert:
        that:
          - app_domain | length > 0
          - image_repository | length > 0
          - thesis_db_password | length > 0
          - vector_db_password | length > 0
          - azure_openai_endpoint | length > 0
          - azure_openai_api_key | length > 0
          - grafana_admin_password | length > 0
        fail_msg: "Set APP_DOMAIN, IMAGE_REPOSITORY, THESIS_DB_PASSWORD, VECTOR_DB_PASSWORD, AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, and GRAFANA_ADMIN_PASSWORD before running this playbook."

    - name: Validate Certbot environment variables when Certbot is enabled
      ansible.builtin.assert:
        that:
          - certbot_email | length > 0
        fail_msg: "Set CERTBOT_EMAIL, or run with ENABLE_CERTBOT=false."
      when: enable_certbot

  roles:
    - docker
    - app
    - role: certbot
      when: enable_certbot
