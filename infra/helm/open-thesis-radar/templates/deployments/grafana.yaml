{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  labels:
    {{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "grafana" "component" "monitoring") | nindent 4 }}
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      labels:
        {{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "grafana" "component" "monitoring") | nindent 8 }}
    spec:
      containers:
        - name: grafana-container
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.grafana.name }}
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.grafana.name }}
                  key: admin-password
            - name: THESIS_DB_USER
              value: {{ index .Values "thesis-db" "auth" "username" | quote }}
            - name: THESIS_DB_NAME
              value: {{ index .Values "thesis-db" "auth" "database" | quote }}
            - name: THESIS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.thesisDb.name }}
                  key: {{ index .Values "thesis-db" "auth" "secretKeys" "userPasswordKey" }}
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasource-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider-volume
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-volume
              mountPath: /var/lib/grafana/dashboards
            - name: alerting-volume
              mountPath: /etc/grafana/provisioning/alerting
      volumes:
        - name: datasource-volume
          configMap:
            name: grafana-datasource-config
        - name: dashboards-provider-volume
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards-volume
          configMap:
            name: grafana-dashboards
        - name: alerting-volume
          configMap:
            name: grafana-alerting-config
{{- end }}
