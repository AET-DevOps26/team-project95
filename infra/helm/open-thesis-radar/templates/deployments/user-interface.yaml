apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-interface-deployment
  labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "user-interface" "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.userInterface.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-interface
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
      labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "user-interface" "component" "frontend") | nindent 8 }}
    spec:
      containers:
        - name: user-interface-container
          image: "{{ .Values.images.frontend.repository }}:{{ include "open-thesis-radar.imageTag" . }}"
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{- toYaml .Values.userInterface.resources | nindent 12 }}
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.5.1
          args:
            - -nginx.scrape-uri=http://127.0.0.1:80/nginx_status
          ports:
            - containerPort: 9113
              name: metrics
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
