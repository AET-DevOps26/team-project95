{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  labels:
    {{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "grafana" "component" "monitoring") | nindent 4 }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        uid: prometheus
        editable: true
{{- end }}
