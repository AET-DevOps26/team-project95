{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    {{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "grafana" "component" "monitoring") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
  ports:
    - protocol: TCP
      port: 3000
      targetPort: http
      name: http
{{- end }}
