apiVersion: v1
kind: Service
metadata:
  name: genai-service
  labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "genai-service" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: genai-service
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
  ports:
    - protocol: TCP
      port: 8000
      targetPort: http
