{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    {{- include "open-thesis-radar.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'thesis-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['thesis-service:8080']

      - job_name: 'scraping-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['scraping-service:8081']

      - job_name: 'vector-search-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['vector-search-service:8082']

      - job_name: 'genai-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['genai-service:8000']
{{- end }}
