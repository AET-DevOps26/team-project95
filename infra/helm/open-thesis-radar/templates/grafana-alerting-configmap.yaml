{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-config
  labels:
    {{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "grafana" "component" "monitoring") | nindent 4 }}
data:
  alerting.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: "OpenThesisRadarAlerts"
        folder: "Alerts"
        interval: "1m"
        rules:
          - uid: "instance-down-alert"
            title: "InstanceDown"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: "up"
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: "eq"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "1m"
            annotations:
              summary: "Instance {{ "{{" }} $labels.instance {{ "}}" }} down"
              description: "{{ "{{" }} $labels.instance {{ "}}" }} of job {{ "{{" }} $labels.job {{ "}}" }} has been down for more than 1 minute."
            labels:
              severity: "page"

          - uid: "jvm-heap-memory-critical-alert"
            title: "JvmHeapMemoryCritical"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: 'jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} * 100'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [90]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "5m"
            annotations:
              summary: "JVM Heap Memory critical"
              description: 'JVM Heap Memory usage for {{ "{{" }} $labels.instance {{ "}}" }} is {{ "{{" }} printf "%.2f" $values.B.Value {{ "}}" }}%, which is above 90% for 5 minutes.'
            labels:
              severity: "critical"

          - uid: "http-5xx-rate-high-alert"
            title: "Http5xxRateHigh"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: '(sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job) / sum(rate(http_server_requests_seconds_count[5m])) by (job) * 100) or (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) / sum(rate(http_requests_total[5m])) by (job) * 100)'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [5]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "2m"
            annotations:
              summary: "HTTP 5xx Error Rate High"
              description: 'HTTP 5xx error rate for job {{ "{{" }} $labels.job {{ "}}" }} is {{ "{{" }} printf "%.2f" $values.B.Value {{ "}}" }}%, which is above 5% for 2 minutes.'
            labels:
              severity: "critical"

          - uid: "service-high-latency-alert"
            title: "ServiceHighLatency"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: '(sum(rate(http_server_requests_seconds_sum[5m])) by (job) / sum(rate(http_server_requests_seconds_count[5m])) by (job)) or (sum(rate(http_request_duration_seconds_sum[5m])) by (job) / sum(rate(http_request_duration_seconds_count[5m])) by (job))'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [3]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "5m"
            annotations:
              summary: "Service response latency high"
              description: 'Average latency for job {{ "{{" }} $labels.job {{ "}}" }} is {{ "{{" }} printf "%.2f" $values.B.Value {{ "}}" }} seconds, which is above 3 seconds for 5 minutes.'
            labels:
              severity: "warning"

          - uid: "scraper-failure-spike-alert"
            title: "ScraperFailureSpike"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: 'increase(scraping_endpoints_processed_total{status="FAILED"}[15m])'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "5m"
            annotations:
              summary: "Scraper run failed"
              description: "A scraper run has failed in the last 15 minutes."
            labels:
              severity: "warning"

          - uid: "vector-index-sync-failed-alert"
            title: "VectorIndexSyncFailed"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: 'increase(http_server_requests_seconds_count{uri="/internal/v1/vector-search-service/source-endpoints/{sourceEndpointId}/index", status=~"5.."}[5m])'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "1m"
            annotations:
              summary: "Vector search index sync failing"
              description: "Relational data was updated but sync to PgVector failed in the last 5 minutes."
            labels:
              severity: "critical"

          - uid: "genai-upstream-errors-alert"
            title: "GenAiUpstreamErrors"
            condition: "C"
            data:
              - refId: "A"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "prometheus"
                model:
                  expr: '(sum(rate(genai_llm_calls_total{status=~"upstream_error|config_error"}[5m])) / sum(rate(genai_llm_calls_total[5m]))) * 100'
                  instant: true
                  queryType: "instant"
                  intervalMs: 15000
                  maxDataPoints: 43200
                  refId: "A"
              - refId: "B"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  expression: "A"
                  reducer: "last"
                  type: "reduce"
                  refId: "B"
              - refId: "C"
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "__expr__"
                model:
                  conditions:
                    - evaluator:
                        params: [10]
                        type: "gt"
                      operator:
                        type: "and"
                      query:
                        params: ["B"]
                  expression: "B"
                  type: "threshold"
                  refId: "C"
            noDataState: "OK"
            execErrState: "Alerting"
            for: "2m"
            annotations:
              summary: "GenAI Service Upstream Failure Rate High"
              description: 'LLM extraction queries are failing at a rate of {{ "{{" }} printf "%.2f" $values.B.Value {{ "}}" }}%.'
            labels:
              severity: "critical"
{{- end }}
