{{- if .Values.secrets.create }}
{{- if or (empty .Values.secrets.thesisDb.password) (eq .Values.secrets.thesisDb.password "CHANGE_ME") }}
{{- fail "secrets.thesisDb.password must be set when secrets.create=true" }}
{{- end }}
{{- if or (empty .Values.secrets.vectorDb.password) (eq .Values.secrets.vectorDb.password "CHANGE_ME") }}
{{- fail "secrets.vectorDb.password must be set when secrets.create=true" }}
{{- end }}
{{- if or (empty .Values.secrets.azureOpenAi.endpoint) (eq .Values.secrets.azureOpenAi.endpoint "CHANGE_ME") }}
{{- fail "secrets.azureOpenAi.endpoint must be set when secrets.create=true" }}
{{- end }}
{{- if or (empty .Values.secrets.azureOpenAi.apiKey) (eq .Values.secrets.azureOpenAi.apiKey "CHANGE_ME") }}
{{- fail "secrets.azureOpenAi.apiKey must be set when secrets.create=true" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.thesisDb.name }}
  labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "thesis-db" "component" "database") | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.thesisDb.username | quote }}
  password: {{ .Values.secrets.thesisDb.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.vectorDb.name }}
  labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "vector-db" "component" "database") | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.vectorDb.username | quote }}
  password: {{ .Values.secrets.vectorDb.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.azureOpenAi.name }}
  labels:
{{- include "open-thesis-radar.componentLabels" (dict "root" . "name" "azure-openai" "component" "external-ai") | nindent 4 }}
type: Opaque
stringData:
  endpoint: {{ .Values.secrets.azureOpenAi.endpoint | quote }}
  api-key: {{ .Values.secrets.azureOpenAi.apiKey | quote }}
{{- end }}
