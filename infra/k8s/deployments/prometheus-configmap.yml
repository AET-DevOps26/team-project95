apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: open-thesis-radar
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'thesis-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['thesis-service:8080']

      - job_name: 'scraping-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['scraping-service:8081']

      - job_name: 'vector-search-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['vector-search-service:8082']

      - job_name: 'genai-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['genai-service:8000']
