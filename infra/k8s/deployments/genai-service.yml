apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service-deployment
  namespace: open-thesis-radar
  labels:
    app: genai-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: genai-service
  template:
    metadata:
      labels:
        app: genai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: genai-service-container
          image: ghcr.io/aet-devops26/team-project95/genai-service:IMAGE_TAG
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: GENAI_USE_OLLAMA
              value: "false"
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secret
                  key: endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secret
                  key: api-key
            - name: AZURE_OPENAI_CHAT_DEPLOYMENT
              value: gpt-5.4
            - name: AZURE_OPENAI_API_VERSION
              value: 2024-12-01-preview
            - name: GENAI_MAX_COMPLETION_TOKENS
              value: "30000"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
