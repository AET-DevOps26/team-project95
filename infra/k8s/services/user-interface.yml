apiVersion: v1
kind: Service
metadata:
  name: user-interface
  namespace: open-thesis-radar
  labels:
    app: user-interface
spec:
  type: ClusterIP
  selector:
    app: user-interface
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
      name: http
    - protocol: TCP
      port: 9113
      targetPort: metrics
      name: metrics
