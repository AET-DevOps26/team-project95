name: team-project95

services:
  frontend:
    build:
      context: ./user_interface/open-thesis-radar
    ports:
      - "3000:80"
      - "9113:9113"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  genai-service:
    build:
      context: .
      dockerfile: services/genai-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GENAI_USE_OLLAMA: ${GENAI_USE_OLLAMA:-false}
      GENAI_MAX_COMPLETION_TOKENS: ${GENAI_MAX_COMPLETION_TOKENS:-30000}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.4}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      GENAI_MODEL_NAME: ${GENAI_MODEL_NAME:-llama3.1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  scraping-service:
    build:
      context: .
      dockerfile: services/scraping-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      APP_SERVICES_MAIN_THESIS: ${APP_SERVICES_MAIN_THESIS:-http://thesis-service:8080}
      APP_SERVICES_GENAI: ${APP_SERVICES_GENAI:-http://genai-service:8000}
      CLIENT_CONNECT_TIMEOUT: ${CLIENT_CONNECT_TIMEOUT:-4000}
      CLIENT_READ_TIMEOUT: ${CLIENT_READ_TIMEOUT:-300000}

    depends_on:
      thesis-service:
        condition: service_started
      genai-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health/liveness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector-search-service:
    build:
      context: .
      dockerfile: services/vector-search-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      # Azure OpenAI embedding settings.
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-https://api.openai.com}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-dummy-key}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-ada-002}
      AZURE_OPENAI_EMBEDDING_MODEL: ${AZURE_OPENAI_EMBEDDING_MODEL:-text-embedding-ada-002}
      PGVECTOR_DIMENSIONS: ${PGVECTOR_DIMENSIONS:-1536}

      # Dedicated PGvector database owned by the vector-search-service.
      PGVECTOR_URL: jdbc:postgresql://vector-db:5432/${VECTOR_DB_NAME:-vector_search_db}
      PGVECTOR_USERNAME: ${VECTOR_DB_USER:-vector_user}
      PGVECTOR_PASSWORD: ${VECTOR_DB_PASSWORD:-vector_password}
    depends_on:
      vector-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health/liveness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  thesis-service:
    build:
      context: .
      dockerfile: services/thesis-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      THESIS_DB_HOST: thesis-db
      THESIS_DB_PORT: 5432
      THESIS_DB_NAME: ${THESIS_DB_NAME:-thesis_db}
      THESIS_DB_USER: ${THESIS_DB_USER:-thesis_user}
      THESIS_DB_PASSWORD: ${THESIS_DB_PASSWORD:-thesis_password}
      THESIS_VECTOR_SEARCH_URL: ${THESIS_VECTOR_SEARCH_URL:-http://vector-search-service:8082}
    depends_on:
      thesis-db:
        condition: service_healthy
      vector-search-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector-db:
    image: pgvector/pgvector:pg16
    container_name: vector-postgres-db
    environment:
      POSTGRES_DB: ${VECTOR_DB_NAME:-vector_search_db}
      POSTGRES_USER: ${VECTOR_DB_USER:-vector_user}
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:-vector_password}
    ports:
      - "5433:5432"
    volumes:
      - vector_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  thesis-db:
    image: postgres:16-alpine
    container_name: thesis-postgres-db
    environment:
      POSTGRES_DB: ${THESIS_DB_NAME:-thesis_db}
      POSTGRES_USER: ${THESIS_DB_USER:-thesis_user}
      POSTGRES_PASSWORD: ${THESIS_DB_PASSWORD:-thesis_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    network_mode: "service:frontend"
    command:
      - --nginx.scrape-uri=http://127.0.0.1:80/nginx_status
    depends_on:
      frontend:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    depends_on:
      thesis-service:
        condition: service_healthy
      scraping-service:
        condition: service_healthy
      vector-search-service:
        condition: service_healthy
      genai-service:
        condition: service_healthy
      nginx-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - THESIS_DB_USER=${THESIS_DB_USER:-thesis_user}
      - THESIS_DB_NAME=${THESIS_DB_NAME:-thesis_db}
      - THESIS_DB_PASSWORD=${THESIS_DB_PASSWORD:-thesis_password}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus


volumes:
  postgres_data:
  vector_postgres_data:
