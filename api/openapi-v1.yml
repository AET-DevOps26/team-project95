openapi: 3.0.3
info:
  title: Thesis Discovery Platform API
  version: 0.1.0
  description: |
    Simplified API contract for the thesis discovery platform.

    The system has four services:

    - Thesis Service: owns PostgreSQL data and exposes the frontend API.
    - Scraping Service: periodically scrapes chair/source websites and sends extracted results to the Thesis Service.
    - GenAI Service: converts raw scraped content into structured thesis entries.
    - Vector Search Service: owns the vector database and supports semantic search plus reindexing.

    Important design decision:
    During every successful scrape run for a chair, the Thesis Service replaces all existing thesis proposals
    for that chair in one transaction before instructing the Vector Search Service to refresh the
    corresponding vector index entries.

servers:
  - url: http://localhost:8080
    description: Thesis Service
  - url: http://localhost:8081
    description: Scraping Service
  - url: http://localhost:8082
    description: Vector Search Service
  - url: http://localhost:8000
    description: GenAI Service

tags:
  - name: Frontend API
    description: Endpoints called by the web frontend.
  - name: Thesis Service Internal API
    description: Internal endpoints exposed by the Thesis Service.
  - name: Scraping Service API
    description: Endpoints exposed by the Scraping Service.
  - name: Vector Search API
    description: Endpoints exposed by the Vector Search Service.
  - name: GenAI API
    description: Endpoints exposed by the GenAI Service.
  - name: Health
    description: Health checks for all services.

paths:
  /api/v1/theses/search:
    post:
      tags:
        - Frontend API
      summary: Search and filter theses
      description: |
        Search thesis proposals using traditional filters, natural language, or both.

        Request examples:
        - Only filters: `degreeType = "MASTER"`, `researchAreas = ["AI"]`
        - Only natural language: `"I want a thesis about semantic search with LLMs"`
        - Hybrid: natural language query plus traditional filters

        The Thesis Service fetches matching structured data from PostgreSQL.
        If `naturalLanguageQuery` is present, it also calls the Vector Search Service
        and combines vector results with relational filtering.
      operationId: searchTheses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchThesesRequest'
            examples:
              traditionalFiltersOnly:
                summary: Traditional filters only
                value:
                  filters:
                    chairIds: [1, 3]
                    degreeTypes: ["MASTER"]
                    researchAreas: ["Artificial Intelligence", "Software Engineering"]
                    tags: ["LLM", "Search"]
                    status: "OPEN"
                  page: 0
                  size: 20
              naturalLanguageOnly:
                summary: Natural language only
                value:
                  naturalLanguageQuery: "I want a thesis about semantic search for university documents"
                  page: 0
                  size: 20
              hybridSearch:
                summary: Natural language plus filters
                value:
                  naturalLanguageQuery: "computer vision thesis with practical implementation"
                  filters:
                    degreeTypes: ["BACHELOR", "MASTER"]
                    chairIds: [2]
                    status: "OPEN"
                  page: 0
                  size: 20
      responses:
        '200':
          description: Search results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchThesesResponse'

  /api/v1/theses/{thesisId}:
    get:
      tags:
        - Frontend API
      summary: Get thesis details
      description: Fetch one thesis proposal by id.
      operationId: getThesisById
      parameters:
        - $ref: '#/components/parameters/ThesisId'
      responses:
        '200':
          description: Thesis proposal found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThesisProposal'
        '404':
          description: Thesis proposal not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/chairs:
    get:
      tags:
        - Frontend API
      summary: List chairs
      description: Fetch chairs for frontend filters.
      operationId: listChairs
      responses:
        '200':
          description: Chairs returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chair'

  /api/v1/filters:
    get:
      tags:
        - Frontend API
      summary: Get available filter values
      description: Fetch available filter values such as degree types, research areas, tags, and chairs.
      operationId: getAvailableFilters
      responses:
        '200':
          description: Available filters returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableFiltersResponse'

  /internal/v1/thesis-service/source-endpoints:
    get:
      tags:
        - Thesis Service Internal API
      summary: List source endpoints for scraping
      description: |
        Called by the Scraping Service before a scrape cycle.

        The Thesis Service returns all configured chair websites/source endpoints that should be scraped.
        The Scraping Service then processes them sequentially.
      operationId: listSourceEndpointsForScraping
      responses:
        '200':
          description: Source endpoints returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceEndpointListResponse'

  /internal/v1/thesis-service/scrape-runs:
    post:
      tags:
        - Thesis Service Internal API
      summary: Log a scrape run result
      description: |
        Called by the Scraping Service to record the outcome of a scrape attempt.
        This should be called for both successful and failed runs to maintain a complete history.
      operationId: logScrapeRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRunLogRequest'
      responses:
        '201':
          description: Scrape run logged successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapeRunLogResponse'

  /internal/v1/thesis-service/source-endpoints/{sourceEndpointId}/theses:
    put:
      tags:
        - Thesis Service Internal API
      summary: Replace all thesis proposals for a chair
      description: |
        Called by the Scraping Service only after successful scraping and successful
        GenAI extraction for one chair/source endpoint.

        Thesis Service behavior:
        1. In one transaction, delete all existing thesis proposals for `chairId`
           and insert the newly extracted thesis proposals.
        2. Commit only if the full replacement succeeds.
        3. After relational replacement succeeds, call the Vector Search Service
           to replace the vector index entries for the same chair.

        If validation or insertion fails, the old thesis data must remain unchanged.
      operationId: replaceChairTheses
      parameters:
        - $ref: '#/components/parameters/SourceEndpointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceEndpointThesesReplacementRequest'
            example:
              sourceEndpointId: 10
              startedAt: "2026-05-10T08:00:00Z"
              finishedAt: "2026-05-10T08:01:42Z"
              status: "SUCCESS"
              errorMessage: null
              rawHtmlSnapshotUrl: null
              theses:
                - title: "Semantic Search for Thesis Discovery"
                  degreeType: "MASTER"
                  originalDescription: "This thesis investigates semantic search for university thesis proposals..."
                  aiOverview: "Build and evaluate a semantic search pipeline for thesis discovery."
                  researchArea: "Artificial Intelligence"
                  sourceUrl: "https://example-chair.tum.de/theses/semantic-search"
                  status: "OPEN"
                  advisors:
                    - name: "Max Mustermann"
                      email: "max.mustermann@example.com"
                      profileUrl: "https://example-chair.tum.de/team/max"
                  tags:
                    - "Semantic Search"
                    - "LLM"
                    - "Information Retrieval"
      responses:
        '200':
          description: Chair thesis data replaced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceEndpointThesesReplacementResponse'
        '400':
          description: Invalid replacement payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/v1/scraping-service/scrape:
    post:
      tags:
        - Scraping Service API
      summary: Trigger a scrape run
      description: |
        Starts a scrape run in the Scraping Service for all source endpoints returned by the Thesis Service.
        This endpoint can be used by a scheduled job or manually for demo/testing.
      operationId: triggerScrape
      responses:
        '202':
          description: Scrape run accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerScrapeResponse'

  /internal/v1/vector-search-service/search:
    post:
      tags:
        - Vector Search API
      summary: Semantic thesis search
      description: |
        Called by the Thesis Service when the frontend sends a natural language query.

        The Vector Search Service embeds the query, searches the vector database, and returns matching thesis ids
        with similarity scores. The Thesis Service can then fetch full thesis data from PostgreSQL and apply
        additional traditional filters.
      operationId: semanticSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorSearchRequest'
            example:
              query: "I want a thesis about semantic search with LLMs"
              filters:
                chairIds: [3]
                degreeTypes: ["MASTER"]
              limit: 50
      responses:
        '200':
          description: Vector search results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorSearchResponse'

  /internal/v1/vector-search-service/source-endpoints/{sourceEndpointId}/index:
    post:
      tags:
        - Vector Search API
      summary: Replace vector index entries for a chair
      description: |
        Called by the Thesis Service after relational thesis replacement succeeded.

        Vector Search Service behavior:
        1. Delete all existing vector index entries belonging to `chairId`.
        2. Generate embeddings for the provided theses.
        3. Insert the new vector index entries.
      operationId: indexChairTheses
      parameters:
        - $ref: '#/components/parameters/SourceEndpointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceSourceEndpointVectorsRequest'
            example:
              scrapeRunId: 42
              theses:
                - thesisId: 1001
                  chairId: 3
                  title: "Semantic Search for Thesis Discovery"
                  degreeType: "MASTER"
                  aiOverview: "Build and evaluate a semantic search pipeline for thesis discovery."
                  originalDescription: "This thesis investigates semantic search for university thesis proposals..."
                  researchArea: "Artificial Intelligence"
                  sourceUrl: "https://example-chair.tum.de/theses/semantic-search"
                  tags: ["Semantic Search", "LLM", "Information Retrieval"]
      responses:
        '200':
          description: Vector index entries for the chair were replaced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceSourceEndpointVectorsResponse'

  /internal/v1/genai-service/extract-theses:
    post:
      tags:
        - GenAI API
      summary: Extract structured theses from scraped content
      description: |
        Called by the Scraping Service after it downloads raw HTML/text from a source endpoint.

        The GenAI Service returns structured thesis proposals extracted from the raw content.
        It does not write to PostgreSQL or the vector database.
      operationId: extractThesesFromRawContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenAIExtractionRequest'
            example:
              sourceEndpointId: 10
              chairId: 3
              chairName: "Chair of Software Engineering"
              sourceUrl: "https://example-chair.tum.de/theses"
              rawHtml: "<html>...</html>"
      responses:
        '200':
          description: Structured thesis proposals extracted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenAIExtractionResponse'
        '422':
          description: Extraction could not produce reliable structured output.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /internal/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Generic health endpoint implemented by every service.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  parameters:
    SourceEndpointId:
      name: sourceEndpointId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Internal source endpoint id.

    ChairId:
      name: chairId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Internal chair id.

    ThesisId:
      name: thesisId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Internal thesis proposal id.

  schemas:
    SearchThesesRequest:
      type: object
      properties:
        naturalLanguageQuery:
          type: string
          nullable: true
          description: Optional natural language query used for semantic search.
          example: "I want a thesis about semantic search with LLMs"
        filters:
          $ref: '#/components/schemas/ThesisSearchFilters'
        page:
          type: integer
          minimum: 0
          default: 0
        size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      additionalProperties: false

    ThesisSearchFilters:
      type: object
      properties:
        chairIds:
          type: array
          items:
            type: integer
            format: int64
        degreeTypes:
          type: array
          items:
            type: string
            example: "MASTER"
        researchAreas:
          type: array
          items:
            type: string
            example: "Artificial Intelligence"
        tags:
          type: array
          items:
            type: string
            example: "LLM"
        status:
          type: string
          nullable: true
          example: "OPEN"
      additionalProperties: false

    SearchThesesResponse:
      type: object
      required:
        - items
        - page
        - size
        - totalElements
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ThesisSearchResult'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 123

    ThesisSearchResult:
      allOf:
        - $ref: '#/components/schemas/ThesisProposal'
        - type: object
          properties:
            semanticScore:
              type: number
              format: float
              nullable: true
              description: Present when result came from semantic/vector search.
              example: 0.87

    Chair:
      type: object
      required:
        - id
        - name
        - websiteUrl
      properties:
        id:
          type: integer
          format: int64
          example: 3
        name:
          type: string
          example: "Chair of Software Engineering"
        websiteUrl:
          type: string
          format: uri
          example: "https://example-chair.tum.de"

    SourceEndpoint:
      type: object
      required:
        - id
        - chairId
        - url
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 10
        chairId:
          type: integer
          format: int64
          example: 3
        chairName:
          type: string
          example: "Chair of Software Engineering"
        url:
          type: string
          format: uri
          example: "https://example-chair.tum.de/theses"
        status:
          type: string
          example: "ACTIVE"
        lastScrapedAt:
          type: string
          format: date-time
          nullable: true

    SourceEndpointListResponse:
      type: object
      required:
        - endpoints
      properties:
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/SourceEndpoint'

    ThesisProposal:
      type: object
      required:
        - id
        - chairId
        - title
        - sourceUrl
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 1001
        chairId:
          type: integer
          format: int64
          example: 3
        chairName:
          type: string
          nullable: true
          example: "Chair of Software Engineering"
        title:
          type: string
          example: "Semantic Search for Thesis Discovery"
        degreeType:
          type: string
          nullable: true
          example: "MASTER"
        originalDescription:
          type: string
          nullable: true
        aiOverview:
          type: string
          nullable: true
        researchArea:
          type: string
          nullable: true
          example: "Artificial Intelligence"
        sourceUrl:
          type: string
          format: uri
        rawHtmlSnapshot:
          type: string
          nullable: true
          description: Optional raw HTML snippet stored for this thesis proposal.
        extractionConfidence:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 1
          example: 0.93
        status:
          type: string
          example: "OPEN"
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        advisors:
          type: array
          items:
            $ref: '#/components/schemas/Advisor'
        tags:
          type: array
          items:
            type: string

    ThesisProposalInput:
      type: object
      required:
        - title
        - sourceUrl
      properties:
        title:
          type: string
        degreeType:
          type: string
          nullable: true
        originalDescription:
          type: string
          nullable: true
        aiOverview:
          type: string
          nullable: true
        researchArea:
          type: string
          nullable: true
        sourceUrl:
          type: string
          format: uri
        status:
          type: string
          default: "OPEN"
        advisors:
          type: array
          items:
            $ref: '#/components/schemas/AdvisorInput'
        tags:
          type: array
          items:
            type: string

    Advisor:
      type: object
      required:
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        email:
          type: string
          format: email
        profileUrl:
          type: string
          format: uri
          nullable: true

    AdvisorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        profileUrl:
          type: string
          format: uri
          nullable: true

    ScrapeRunLogRequest:
      type: object
      required:
        - sourceEndpointId
        - startedAt
        - finishedAt
        - status
      properties:
        sourceEndpointId:
          type: integer
          format: int64
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILED
        errorMessage:
          type: string
          nullable: true
        candidatesFound:
          type: integer
          nullable: true
          example: 5

    ScrapeRunLogResponse:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string

    SourceEndpointThesesReplacementRequest:
      type: object
      required:
        - theses
      properties:
        theses:
          type: array
          items:
            $ref: '#/components/schemas/ThesisProposalInput'

    SourceEndpointThesesReplacementResponse:
      type: object
      required:
        - sourceEndpointId
        - deletedRelationalTheses
        - insertedRelationalTheses
        - replacedVectorEntries
      properties:
        sourceEndpointId:
          type: integer
          format: int64
          example: 10
        deletedRelationalTheses:
          type: integer
          example: 12
        insertedRelationalTheses:
          type: integer
          example: 9
        replacedVectorEntries:
          type: integer
          example: 9
        errorMessage:
          type: string
          nullable: true
          example: "Vector search sync failed: connection refused"

    TriggerScrapeResponse:
      type: object
      required:
        - started
      properties:
        started:
          type: boolean
          example: true
        message:
          type: string
          example: "Scrape run started."

    GenAIExtractionRequest:
      type: object
      required:
        - sourceEndpointId
        - chairId
        - sourceUrl
        - rawHtml
      properties:
        sourceEndpointId:
          type: integer
          format: int64
        chairId:
          type: integer
          format: int64
        chairName:
          type: string
          nullable: true
        sourceUrl:
          type: string
          format: uri
        rawHtml:
          type: string
        extractedPlainText:
          type: string
          nullable: true
          description: Optional plain text extracted by the Scraping Service before calling GenAI.

    GenAIExtractionResponse:
      type: object
      required:
        - theses
      properties:
        theses:
          type: array
          items:
            $ref: '#/components/schemas/ThesisProposalInput'
        extractionNotes:
          type: string
          nullable: true

    VectorSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        filters:
          $ref: '#/components/schemas/VectorSearchFilters'
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50

    VectorSearchFilters:
      type: object
      properties:
        chairIds:
          type: array
          items:
            type: integer
            format: int64
        degreeTypes:
          type: array
          items:
            type: string
        researchAreas:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          nullable: true
      additionalProperties: false

    VectorSearchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VectorSearchResult'

    VectorSearchResult:
      type: object
      required:
        - thesisId
        - score
      properties:
        thesisId:
          type: integer
          format: int64
          example: 1001
        chairId:
          type: integer
          format: int64
          example: 3
        score:
          type: number
          format: float
          example: 0.87

    ReplaceSourceEndpointVectorsRequest:
      type: object
      required:
        - theses
      properties:
        scrapeRunId:
          type: integer
          format: int64
          nullable: true
        theses:
          type: array
          items:
            $ref: '#/components/schemas/VectorThesisDocument'

    VectorThesisDocument:
      type: object
      required:
        - thesisId
        - chairId
        - sourceEndpointId
        - title
        - sourceUrl
      properties:
        thesisId:
          type: integer
          format: int64
        chairId:
          type: integer
          format: int64
        sourceEndpointId:
          type: integer
          format: int64
        title:
          type: string
        degreeType:
          type: string
          nullable: true
        aiOverview:
          type: string
          nullable: true
        originalDescription:
          type: string
          nullable: true
        researchArea:
          type: string
          nullable: true
        sourceUrl:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string

    ReplaceSourceEndpointVectorsResponse:
      type: object
      required:
        - sourceEndpointId
        - deletedVectorEntries
        - insertedVectorEntries
      properties:
        sourceEndpointId:
          type: integer
          format: int64
        deletedVectorEntries:
          type: integer
          example: 12
        insertedVectorEntries:
          type: integer
          example: 9

    AvailableFiltersResponse:
      type: object
      properties:
        chairs:
          type: array
          items:
            $ref: '#/components/schemas/Chair'
        degreeTypes:
          type: array
          items:
            type: string
        researchAreas:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "UP"
        service:
          type: string
          nullable: true
          example: "main-thesis-service"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        details:
          type: object
          nullable: true
          additionalProperties: true
