server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /api/ {
        # TODO: update the host/port if the deployed service name differs.
        # The frontend keeps using relative /api/v1/... URLs; nginx forwards them to the thesis microservice.
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $thesis_service_url http://thesis-service:8080;
        proxy_pass $thesis_service_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
